<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="background-color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:40px 0;margin:0;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background-color:#ffffff;border:1px solid #eaeaea;border-radius:8px;padding:48px;">
    <tr>
      <td>
        <!-- Logo -->
        <svg width="32" height="32" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <rect width="512" height="512" rx="80" fill="#0A0A0A"/>
          <text x="256" y="256" font-family="system-ui,sans-serif" font-size="320" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">G</text>
        </svg>

        <h1 style="font-size:24px;font-weight:700;color:#000000;margin:32px 0;">Confirm your email</h1>
        <p style="font-size:16px;line-height:1.6;color:#000000;margin:0 0 24px 0;">
          Click the button below to verify your email address and activate your account.
        </p>

        <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#000000;color:#ffffff;font-size:16px;font-weight:500;padding:12px 24px;border-radius:6px;text-decoration:none;">
          Confirm email
        </a>

        <p style="font-size:14px;line-height:1.6;color:#666666;margin:24px 0 0 0;">
          If the button doesn't work, paste this link into your browser:
        </p>
        <p style="font-size:14px;line-height:1.6;color:#666666;word-break:break-all;margin:8px 0 0 0;">
          {{ .ConfirmationURL }}
        </p>

        <hr style="border:none;border-top:1px solid #eaeaea;margin:32px 0;" />

        <p style="font-size:14px;color:#666666;margin:4px 0;">&copy; 2026 Get Capital. All rights reserved.</p>
        <p style="font-size:14px;color:#666666;margin:4px 0;">Australia</p>
      </td>
    </tr>
  </table>
</body>
</html>
